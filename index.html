<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Portfolio v2.03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- [調整可能] 基本設定 --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-family: 'Jost', sans-serif;
            
            --photo-margin-pc: 10%;
            --photo-margin-sp: 2.5%; /* スマホ時の上下左右余白 */
            
            --thumb-width-pc: 240px;
            --thumb-gap-pc: 40px;
            --page-padding-pc: 80px;

            --thumb-gap-sp: 5px;
            --page-padding-sp: 10px;

            --ui-font-size: 13px;
            --ui-font-weight: 400;
            --ui-letter-spacing: 0.15em;
            --ui-line-height: 1.5;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden; 
        }

        /* --- 共通：ナビゲーション --- */
        #nav-ui {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            font-size: var(--ui-font-size);
            letter-spacing: var(--ui-letter-spacing);
            user-select: none;
            line-height: var(--ui-line-height);
            text-align: left;
        }

        .nav-item { cursor: pointer; display: block; text-transform: uppercase; }
        .underline { text-decoration: underline; text-underline-offset: 3px; }

        #project-list { display: none; }
        #current-project-info { display: block; }

        @media (max-width: 768px) {
            #nav-ui {
                top: auto; left: auto;
                right: 25px; bottom: 25px;
                text-align: right;
            }
        }

        /* --- 1写真ページ --- */
        #photo-page {
            display: flex; 
            width: 100vw; 
            height: 100vh;
            justify-content: center; /* 横方向は中央 */
            align-items: center;     /* PCは縦方向も中央 */
            position: relative;
            box-sizing: border-box;
        }

        .single-photo {
            max-width: calc(100% - (var(--photo-margin-pc) * 2));
            max-height: calc(100% - (var(--photo-margin-pc) * 2));
            object-fit: contain;
        }

        /* スマホ時の配置設定 */
        @media (max-width: 768px) {
            #photo-page {
                align-items: flex-start; /* 上寄せに変更 */
                padding-top: var(--photo-margin-sp); /* 上部余白 2.5% */
            }
            .single-photo {
                /* 横幅も 2.5% の余白を維持 */
                max-width: calc(100% - (var(--photo-margin-sp) * 2));
                /* 縦幅は画面の下部まで使い切らないよう制限（ナビとの重なり防止） */
                max-height: calc(100% - (var(--photo-margin-sp) * 4)); 
            }
        }

        .click-area { position: absolute; top: 0; height: 100%; width: 50%; z-index: 10; }
        .prev-area { left: 0; cursor: w-resize; }
        .next-area { right: 0; cursor: e-resize; }

        /* --- 2インデックスページ --- */
        #index-page {
            display: none;
            padding: var(--page-padding-pc);
            box-sizing: border-box;
            width: 100%; height: 100vh;
            overflow-y: auto; 
        }

        .thumbnail-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--thumb-width-pc), 1fr));
            gap: var(--thumb-gap-pc);
            align-content: start;
        }

        @media (max-width: 768px) {
            #index-page { 
                padding: var(--page-padding-sp);
                padding-bottom: 160px;
            }
            .thumbnail-container {
                grid-template-columns: repeat(3, 1fr);
                gap: var(--thumb-gap-sp);
            }
        }

        .thumb { width: 100%; height: auto; cursor: pointer; display: block; }

        body.mode-index #photo-page { display: none; }
        body.mode-index #index-page { display: block; }
        body.mode-index #project-list { display: block; }
        body.mode-index #current-project-info { display: none; }
    </style>
</head>
<body>

    <div id="nav-ui">
        <div class="nav-item underline" onclick="toggleMode()">INDEX</div>
        <div id="project-list"></div>
        <div id="current-project-info">
            <span id="current-project" class="underline">SELECT</span><br>
            <span id="photo-number">01</span>
        </div>
    </div>

    <div id="photo-page">
        <div class="click-area prev-area" onclick="changePhoto(-1)"></div>
        <div class="click-area next-area" onclick="changePhoto(1)"></div>
        <img id="main-photo" class="single-photo" src="" alt="">
    </div>

    <div id="index-page">
        <div class="thumbnail-container" id="thumb-list"></div>
    </div>

    <script>
        // プロジェクトごとの写真枚数設定
        const PROJECTS = {
            "select": 12,
            "wien": 8,
            "amami": 10
        };
        const PHOTO_DIR = "photo/";
        const FILE_EXT = ".jpg";

        let currentCategory = "select"; 
        let currentIndex = 0;
        let photos = [];

        const body = document.body;
        const mainPhoto = document.getElementById('main-photo');
        const photoNumber = document.getElementById('photo-number');
        const currentProjectLabel = document.getElementById('current-project');
        const thumbList = document.getElementById('thumb-list');
        const projectListUI = document.getElementById('project-list');

        function init() {
            renderProjectMenu();
            loadProject(currentCategory, true);
        }

        function renderProjectMenu() {
            projectListUI.innerHTML = '';
            Object.keys(PROJECTS).forEach(key => {
                const div = document.createElement('div');
                div.className = 'nav-item';
                if(key === currentCategory) div.classList.add('underline');
                div.innerText = key;
                div.onclick = (e) => {
                    e.stopPropagation();
                    loadProject(key, false);
                };
                projectListUI.appendChild(div);
            });
        }

        function loadProject(category, isRandomStart) {
            currentCategory = category;
            photos = [];
            const count = PROJECTS[category];

            for (let i = 1; i <= count; i++) {
                const fileName = `${category}_${i.toString().padStart(3, '0')}${FILE_EXT}`;
                photos.push(PHOTO_DIR + fileName);
            }

            renderProjectMenu();
            renderThumbnails();

            if (isRandomStart) {
                currentIndex = Math.floor(Math.random() * photos.length);
            } else {
                currentIndex = 0;
            }
            
            updatePhotoUI();
        }

        function renderThumbnails() {
            thumbList.innerHTML = '';
            photos.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'thumb';
                img.id = 'thumb-' + index;
                img.onclick = () => selectPhoto(index);
                thumbList.appendChild(img);
            });
        }

        function updatePhotoUI() {
            mainPhoto.src = photos[currentIndex];
            currentProjectLabel.innerText = currentCategory.toUpperCase();
            photoNumber.innerText = (currentIndex + 1).toString().padStart(2, '0');
        }

        function changePhoto(step) {
            currentIndex += step;
            if (currentIndex >= photos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = photos.length - 1;
            updatePhotoUI();
        }

        function toggleMode() {
            if (body.classList.contains('mode-index')) {
                body.classList.remove('mode-index');
            } else {
                body.classList.add('mode-index');
                setTimeout(() => {
                    const target = document.getElementById('thumb-' + currentIndex);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 10);
            }
        }

        function selectPhoto(index) {
            currentIndex = index;
            updatePhotoUI();
            body.classList.remove('mode-index');
        }

        init();
    </script>
</body>
</html>
