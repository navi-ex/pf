<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Portfolio</title>
    <!-- Google Fonts から Jost を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- [調整可能] 基本設定 --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-family: 'Jost', sans-serif;
            
            /* 余白の設定 */
            --photo-margin-pc: 10%;    /* PC時の余白 */
            --photo-margin-sp: 2.5%;   /* スマホ時の余白 (2.5%) */
            
            --thumb-width: 180px;
            --thumb-gap: 20px;
            --ui-font-size: 13px;
            --ui-font-weight: 400;
            --ui-spacing: 1.0em;
            --ui-letter-spacing: 0.15em;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            font-weight: var(--ui-font-weight);
            overflow: hidden; 
        }

        /* --- 共通：ナビゲーション --- */
        #nav-ui {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            cursor: pointer;
            font-size: var(--ui-font-size);
            letter-spacing: var(--ui-letter-spacing);
            user-select: none;
            display: flex;
            align-items: center;
            line-height: 1;
        }

        #photo-number {
            margin-right: var(--ui-spacing);
            font-variant-numeric: tabular-nums;
        }

        /* スマホ時のナビゲーション (右下固定) */
        @media (max-width: 768px) {
            #nav-ui {
                top: auto;
                left: auto;
                right: 25px;
                bottom: 25px;
            }
        }

        /* --- 1写真ページ --- */
        #photo-page {
            display: flex;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .single-photo {
            /* デフォルト（PC）の余白設定 */
            max-width: calc(100% - (var(--photo-margin-pc) * 2));
            max-height: calc(100% - (var(--photo-margin-pc) * 2));
            object-fit: contain;
            user-select: none;
        }

        /* スマホ時の写真サイズ設定 */
        @media (max-width: 768px) {
            .single-photo {
                max-width: calc(100% - (var(--photo-margin-sp) * 2));
                max-height: calc(100% - (var(--photo-margin-sp) * 2));
            }
        }

        .click-area {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 10;
        }
        .prev-area { left: 0; cursor: w-resize; }
        .next-area { right: 0; cursor: e-resize; }

        /* --- 2インデックスページ --- */
        #index-page {
            display: none;
            padding: 100px 40px;
            box-sizing: border-box;
            width: 100%;
            height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 768px) {
            #index-page {
                padding: 40px 40px 100px 40px; 
            }
        }

        .thumbnail-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--thumb-width), 1fr));
            gap: var(--thumb-gap);
            align-content: start;
        }

        .thumb {
            width: 100%;
            height: auto;
            cursor: pointer;
            display: block;
        }

        /* 表示切り替え */
        body.mode-index #photo-page { display: none; }
        body.mode-index #index-page { display: block; }
    </style>
</head>
<body>

    <div id="nav-ui" onclick="toggleMode()">
        <span id="photo-number">--</span> INDEX
    </div>

    <div id="photo-page">
        <div class="click-area prev-area" onclick="changePhoto(-1)"></div>
        <div class="click-area next-area" onclick="changePhoto(1)"></div>
        <img id="main-photo" class="single-photo" src="" alt="">
    </div>

    <div id="index-page">
        <div class="thumbnail-container" id="thumb-list"></div>
    </div>

    <script>
        /* --- [重要] 写真の設定 --- */
        const TOTAL_PHOTOS = 12;      
        const PHOTO_DIR = "photo/";   
        const FILE_PREFIX = "photo_"; 
        const FILE_EXT = ".jpg";      

        const photos = [];
        for (let i = 1; i <= TOTAL_PHOTOS; i++) {
            const fileName = FILE_PREFIX + i.toString().padStart(3, '0') + FILE_EXT;
            photos.push(PHOTO_DIR + fileName);
        }

        // ランダム開始
        let currentIndex = Math.floor(Math.random() * photos.length);
        
        const body = document.body;
        const mainPhoto = document.getElementById('main-photo');
        const photoNumber = document.getElementById('photo-number');
        const thumbList = document.getElementById('thumb-list');

        function init() {
            photos.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'thumb';
                img.id = 'thumb-' + index;
                img.loading = "lazy";
                img.onclick = (e) => {
                    e.stopPropagation();
                    selectPhoto(index);
                };
                thumbList.appendChild(img);
            });
            updatePhoto();
        }

        function updatePhoto() {
            mainPhoto.src = photos[currentIndex];
            if (!body.classList.contains('mode-index')) {
                photoNumber.style.display = 'inline';
                photoNumber.innerText = (currentIndex + 1).toString().padStart(2, '0');
            }
        }

        function changePhoto(step) {
            currentIndex += step;
            if (currentIndex >= photos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = photos.length - 1;
            updatePhoto();
        }

        function toggleMode() {
            if (body.classList.contains('mode-index')) {
                body.classList.remove('mode-index');
                updatePhoto();
            } else {
                body.classList.add('mode-index');
                photoNumber.style.display = 'none'; 
                
                setTimeout(() => {
                    const targetThumb = document.getElementById('thumb-' + currentIndex);
                    if (targetThumb) {
                        targetThumb.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 10);
            }
        }

        function selectPhoto(index) {
            currentIndex = index;
            body.classList.remove('mode-index');
            updatePhoto();
        }

        init();
    </script>
</body>
</html>
